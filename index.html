<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- Styles CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css" />

    <title>Frontend Mentor | Frontend quiz app</title>

  <body>
    <!-- *=======================================
                    * NAV *
    *=======================================* -->
    <nav id="nav" class="nav">
      <!-- ---=== CATEGORY ICON + TITLE ===--- -->
      <section id="categories-nav" class="nav__categories">
        <!--* ICON CATEGORY *-->
        <div class="cat__icon icon__accessibility">
          <img src="./assets/images/icon-accessibility.svg" alt="" />
        </div>
        <!--* TITLE CATEGORY *-->
        <p class="title__category">Accessibility</p>
      </section>

      <!-- ---=== TOGGLE SWITCH DARKMODE ===--- -->
      <section class="nav__themes">
        <!--* ICON SUN *-->
        <div class="icon__switch-sun">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              fill=""

            />
          </svg>
        </div>
        <input id="theme-switch" class="theme__switch" type="checkbox" />
        <!--* ICON MOON *-->
        <div class="icon__switch-moon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              fill=""
              d="M11.775 4.522A7.5 7.5 0 1 1 4.898 16.09c2.104-.57 4.974-1.953 6.24-5.326.828-2.211.876-4.408.637-6.241ZM20.184 12a8.997 8.997 0 0 0-9.315-8.994.75.75 0 0 0-.713.888c.345 1.821.42 4.092-.424 6.342-1.2 3.201-4.203 4.26-6.115 4.606a.75.75 0 0 0-.542 1.066A9 9 0 0 0 20.184 12Z"
            />
          </svg>
        </div>
      </section>
    </nav>

    <!-- *=========================================
                    * HEADER *
    *=========================================* -->
    <header id="home" class="welcome__container">
      <!-- ---=== TITLE / SUBTITLE ===--- -->
      <!-- TITLE -->
      <section class="title__header">
        <div class="title">
          <span>Welcome to the</span>
          <h1>Frontend Quiz!</h1>
        </div>
        <!-- SUBTITLE -->
        <h3 class="subtitle">Pick a subject to get started.</h3>
      </section>

      <!-- BUTTON -->
      <section id="cat">
        <div id="categories-btn" class="categories__btn">
          <!-- <button class="btn" data-cat="HTML">
            <div class="category__icon icon__html">
              <img src="./assets/images/icon-html.svg" alt="" />
            </div>
            HTML
          </button>
          <button class="btn" data-cat="CSS">
            <div class="category__icon icon__css">
              <img src="./assets/images/icon-css.svg" alt="" />
            </div>
            CSS
          </button>

          <button class="btn" data-cat="JavaScript">
            <div class="category__icon icon__js">
              <img src="./assets/images/icon-js.svg" alt="" />
            </div>
            Javascript
          </button>
          <button class="btn" data-cat="Accessibility">
            <div class="category__icon icon__accessibility">
              <img src="./assets/images/icon-accessibility.svg" alt="" />
            </div>
            Accessibility
          </button> -->
        </div>
      </section>
    </header>

    <!-- *=========================================
                    * MAIN *
    *=========================================* -->
    <main class="quiz__container">
      <!-- ---=== SECTION QUESTION / ANSWERS ===--- -->
      <!-- QUESTION -->
      <section id="quiz" class="quiz">
        <div class="quiz__header">
          <div class="quiz__text">
            <p class="quiz__progress">
              Questions <span id="current-val"></span> of 10
            </p>
            <div id="question" class="quiz__question">
              <!-- Question -->
            </div>
          </div>
          <input id="progress-bar" type="range" min="1" max="10" value="1" />
        </div>

        <!-- ANSWERS  -->
        <div class="quiz__answers">
          <div id="quiz-options" class="categories__btn">
            <!-- answer buttons -->
          </div>

          <!-- BUTTON SUBMIT -->
          <div class="submit__container">
            <button id="submit-btn" class="btn submit__btn">
              Submit Answer
            </button>
            <div class="submit__error">
              <div class="submit__error-icon">
                <img src="./assets/images/icon-error.svg" alt="" />
              </div>
              <span>Please select an answer</span>
            </div>
          </div>
        </div>
      </section>

      <!-- ---=== SECTION SCORE ===--- -->
      <section id="score" class="quiz__score">
        <!-- TITLE SCORE -->
        <div class="title">
          <span>Quiz completed</span>
          <h1>You scored...</h1>
        </div>

        <div class="screen__score-container">
          <div id="screen-score" class="screen__score">
            <!-- ICON + CATEFGORY -->
            <div id="categories" class="nav__categories">
              <!-- à paramétrer .... -->
              <div class="cat__icon icon__accessibility">
                <img src="./assets/images/icon-accessibility.svg" alt="" />
              </div>
              <p class="title__cat-score">Accessibility</p>
              <!-- .... à paramétrer -->
            </div>
            <!-- SCORE -->
            <div class="display__score">
              <!-- à paramétrer .... -->
              <h2 id="display-score"></h2>
              <!-- .... à paramétrer -->
              <span>out of 10</span>
            </div>
          </div>

          <button id="score-btn" class="btn score__btn">Play Again</button>
        </div>
      </section>
    </main>

    <!-- *=========================================
                    * JAVASCRIPT *

    <!-- <script type="module" src="/assets/js/main.js"></script> -->
