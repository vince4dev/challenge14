<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- Styles CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css" />

    <!-- Javascript -->
    <script src="./assets/js/main.js" defer></script>

    <title>Frontend Mentor | Frontend quiz app</title>
  </head>

  <body>
    <!-- *=======================================
                    * NAV *
    *=======================================* -->
    <nav class="nav__section">
      <section id="nav-category" class="nav__category">
        <!-- ICON CATEGORY -->
        <div id="cat-icon-nav-container" class="cat__icon">
          <img
            id="nav-cat-icon"
            class="category__icon"
            src=""
            alt="Category Image"
          />
        </div>
        <!-- TITLE CATEGORY -->
        <p id="nav-cat-title" class="title__category"></p>
      </section>

      <section class="nav__darkmode">
        <!-- ICON SUN -->
        <div class="icon__sun">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              fill=""
              d="M12 1.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 1 1-1.5 0v-1.5A.75.75 0 0 1 12 1.5Zm0 15a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm0-1.5a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm9.75-2.25a.75.75 0 1 0 0-1.5h-1.5a.75.75 0 1 0 0 1.5h1.5ZM12 19.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 1 1-1.5 0v-1.5a.75.75 0 0 1 .75-.75Zm-8.25-6.75a.75.75 0 1 0 0-1.5h-1.5a.75.75 0 1 0 0 1.5h1.5Zm.969-8.031a.75.75 0 0 1 1.062 0l1.5 1.5a.751.751 0 0 1-1.062 1.062l-1.5-1.5a.75.75 0 0 1 0-1.062Zm1.062 14.562a.75.75 0 1 1-1.062-1.06l1.5-1.5a.75.75 0 1 1 1.062 1.06l-1.5 1.5Zm13.5-14.562a.75.75 0 0 0-1.062 0l-1.5 1.5a.751.751 0 0 0 1.062 1.062l1.5-1.5a.75.75 0 0 0 0-1.062Zm-1.062 14.562a.75.75 0 0 0 1.062-1.06l-1.5-1.5a.75.75 0 0 0-1.062 1.06l1.5 1.5Z"
            />
          </svg>
        </div>
        <input
          id="darkmode-switch"
          class="darkmode__switch"
          type="checkbox"
          aria-label="Switch darkmode"
        />
        <!-- ICON MOON -->
        <div class="icon__moon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              fill=""
              d="M11.775 4.522A7.5 7.5 0 1 1 4.898 16.09c2.104-.57 4.974-1.953 6.24-5.326.828-2.211.876-4.408.637-6.241ZM20.184 12a8.997 8.997 0 0 0-9.315-8.994.75.75 0 0 0-.713.888c.345 1.821.42 4.092-.424 6.342-1.2 3.201-4.203 4.26-6.115 4.606a.75.75 0 0 0-.542 1.066A9 9 0 0 0 20.184 12Z"
            />
          </svg>
        </div>
      </section>
    </nav>

    <!-- *=========================================
                    * HEADER *
    *=========================================* -->
    <header>
      <section id="home-section" class="home__section">
        <div class="home__title">
          <!-- TITLE -->
          <div class="title">
            <span>Welcome to the</span>
            <h1>Frontend Quiz!</h1>
          </div>
          <!-- SUBTITLE -->
          <h3 class="subtitle">Pick a subject to get started.</h3>
        </div>

        <!-- CATEGORIES BUTTON -->
        <div id="home-cat-btn" class="categories__btn">
          <!-- Categories buttons -->
        </div>
      </section>
    </header>

    <!-- *=========================================
                    * MAIN *
    *=========================================* -->
    <main class="quiz__container">
      <!-- ---=== SECTION QUESTION / ANSWERS ===--- -->
      <!-- QUESTION -->
      <section id="quiz-section" class="quiz__section hidden">
        <div class="quiz__header">
          <div class="quiz__text">
            <p class="quiz__progress">
              Questions <span id="val-span"></span> of 10
            </p>
            <div id="quiz-question" class="quiz__question">
              <!-- Question -->
            </div>
          </div>
          <input
            id="progress-range"
            class="progress__range"
            type="range"
            min="1"
            max="10"
            value="1"
            aria-valuemin="1"
            aria-valuemax="10"
            aria-label="Progress bar"
          />
        </div>

        <!-- ANSWERS  -->
        <div class="quiz__answers">
          <div id="quiz-options" class="categories__btn">
            <!-- Answer buttons -->
          </div>

          <!-- BUTTON SUBMIT -->
          <div class="submit__container">
            <button id="submit-btn" class="btn submit__btn">
              Submit Answer
            </button>
            <div
              id="submit-error"
              class="submit__error"
              role="alert"
              aria-live="polite"
              aria-atomic="true"
            >
              <div class="submit__error-icon">
                <img src="./assets/images/icon-error.svg" alt="" />
              </div>
              <span>Please select an answer</span>
            </div>
          </div>
        </div>
      </section>

      <!-- ---=== SECTION SCORE ===--- -->
      <section id="score-section" class="score__section hidden">
        <!-- TITLE SCORE -->
        <div class="title">
          <span>Quiz completed</span>
          <h1>You scored...</h1>
        </div>

        <div class="screen__score-container">
          <div id="screen-score" class="screen__score">
            <!-- ICON + CATEFGORY -->
            <div id="categories-score" class="score__category">
              <div id="cat-icon-score-container" class="cat__icon">
                <img
                  id="cat-icon-score"
                  class="category__icon"
                  src=""
                  alt="Category Image"
                />
              </div>
              <p id="cat-title-score" class="title__cat-score"></p>
            </div>
            <!-- SCORE -->
            <div class="display__score">
              <h2 id="display-score"></h2>
              <span>out of 10</span>
            </div>
          </div>

          <button id="score-btn" class="btn score__btn">Play Again</button>
        </div>
      </section>
    </main>
  </body>
</html>
